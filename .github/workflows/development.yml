name: Development Workflow

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main ]

jobs:
  dev-lint:
    name: Development Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --with=dev,lint

      - name: Run Black in diff mode
        run: poetry run black --diff .

      - name: Run isort in diff mode
        run: poetry run isort --diff .

      - name: Run flake8
        run: poetry run flake8 .

  dev-test:
    name: Development Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: quantyfin_dev
          POSTGRES_USER: quantyfin
          POSTGRES_PASSWORD: quantyfin123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --with=dev,test

      - name: Wait for services
        run: |
          until pg_isready -h localhost -p 5432 -U quantyfin; do sleep 1; done
          until redis-cli ping; do sleep 1; done

      - name: Run database migrations
        run: |
          poetry run python scripts/init_db.py \
            --database-url "postgresql://quantyfin:quantyfin123@localhost:5432/quantyfin_dev" \
            --skip-seed

      - name: Run pytest (no coverage)
        run: poetry run pytest tests/ -v

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --with=dev,lint

      - name: Run mypy
        run: poetry run mypy app/ --ignore-missing-imports

  build-dev:
    name: Build Development Image
    runs-on: ubuntu-latest
    needs: [dev-lint, dev-test, type-check]
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push development Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dev
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/quantyfin-ai-agent:develop
          cache-from: type=gha
          cache-to: type=gha,mode=max