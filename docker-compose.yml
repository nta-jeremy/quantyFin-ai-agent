version: '3.8'

services:
  # Main application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantyfin-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://quantyfin:quantyfin123@db:5432/quantyfin
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
    depends_on:
      - db
      - redis
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - quantyfin-network

  # PostgreSQL database with pgvector
  db:
    build:
      context: .
      dockerfile: Dockerfile.pgvector
    container_name: quantyfin-db
    environment:
      POSTGRES_DB: quantyfin
      POSTGRES_USER: quantyfin
      POSTGRES_PASSWORD: quantyfin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - quantyfin-network

  # Redis cache
  redis:
    image: redis:8-alpine
    container_name: quantyfin-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - quantyfin-network

  # Development tools (optional)
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: quantyfin-dev
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://quantyfin:quantyfin123@db:5432/quantyfin
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - /app/.venv
    command: /bin/bash -c "poetry install --dev && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    profiles:
      - dev
    networks:
      - quantyfin-network

  # Pgvector verification service (optional)
  pgvector-test:
    build:
      context: .
      dockerfile: Dockerfile.pgvector
    container_name: quantyfin-pgvector-test
    environment:
      POSTGRES_DB: test_quantyfin
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
    ports:
      - "5433:5432"
    command: ["postgres", "-c", "log_statement=all"]
    profiles:
      - test
    networks:
      - quantyfin-network

volumes:
  postgres_data:
  redis_data:

networks:
  quantyfin-network:
    driver: bridge