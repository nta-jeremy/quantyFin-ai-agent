version: '3.8'

services:
  # Main application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantyfin-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://quantyfin:quantyfin123@db:5432/quantyfin
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
    depends_on:
      - db
      - redis
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - quantyfin-network

  # PostgreSQL database with pgvector
  db:
    build:
      context: .
      dockerfile: Dockerfile.pgvector
    container_name: quantyfin-db
    environment:
      POSTGRES_DB: quantyfin
      POSTGRES_USER: quantyfin
      POSTGRES_PASSWORD: quantyfin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - quantyfin-network

  # Redis cache
  redis:
    image: redis:8-alpine
    container_name: quantyfin-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - quantyfin-network

  # Keycloak (for authentication)
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: quantyfin-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak123
      KC_DB_SCHEMA: public
      KC_HEALTH_ENABLED: true
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      # Connection parameters
      KC_DB_POOL: true
      KC_DB_POOL_INITIAL_SIZE: 5
      KC_DB_POOL_MIN_SIZE: 5
      KC_DB_POOL_MAX_SIZE: 20
      # JDBC parameters for better connection handling
      JAVA_OPTS: "-Djdbc.url=jdbc:postgresql://keycloak-db:5432/keycloak?connectTimeout=30&socketTimeout=30&tcpKeepAlive=true"
    ports:
      - "8080:8080"
      - "8443:8443"
    depends_on:
      keycloak-db:
        condition: service_healthy
    command: start-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - quantyfin-network

  # Keycloak database
  keycloak-db:
    image: postgres:16-alpine
    container_name: quantyfin-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak123
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5433:5432"
    volumes:
      - keycloak_data:/var/lib/postgresql/data
      - ./scripts/init-keycloak-db.sql:/docker-entrypoint-initdb.d/init-keycloak-db.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - quantyfin-network

  # Development tools (optional)
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: quantyfin-dev
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://quantyfin:quantyfin123@db:5432/quantyfin
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - /app/.venv
    command: /bin/bash -c "poetry install --dev && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    profiles:
      - dev
    networks:
      - quantyfin-network

  # Pgvector verification service (optional)
  pgvector-test:
    build:
      context: .
      dockerfile: Dockerfile.pgvector
    container_name: quantyfin-pgvector-test
    environment:
      POSTGRES_DB: test_quantyfin
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
    ports:
      - "5433:5432"
    command: ["postgres", "-c", "log_statement=all"]
    profiles:
      - test
    networks:
      - quantyfin-network

volumes:
  postgres_data:
  redis_data:
  keycloak_data:

networks:
  quantyfin-network:
    driver: bridge