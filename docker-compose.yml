services:
  db:
    image: postgres:15-alpine
    container_name: quantyfin-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quantyfin}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-quantyfin}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quantyfin-net

  neo4j:
    image: neo4j:5-community
    container_name: quantyfin-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "127.0.0.1:7474:7474" # HTTP
      - "127.0.0.1:7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-changeme}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quantyfin-net

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: quantyfin-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - NEO4J_URI=bolt://neo4j:7687
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - quantyfin-net

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: quantyfin-frontend
    ports:
      - "3000:8080"
    depends_on:
      - backend
    networks:
      - quantyfin-net

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:

networks:
  quantyfin-net:
    name: quantyfin-net
