<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Radii · Tailwind v4 · QuantyFin Design System</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    /* ─────────────────────────────────────────────────────────
   QuantyFin DS · Tailwind theme bridge (tokens + utilities, NO preflight)
   ─────────────────────────────────────────────────────────
   Map DS CSS vars → Tailwind theme via @theme inline, and load
   ONLY theme + utilities (NOT Preflight) so this can be injected
   into existing specimens WITHOUT resetting their component CSS.

   Requires colors_and_type.css to be loaded (vars live there).
   Full component layer (@apply): tailwind/quantyfin.tailwind.css
   ───────────────────────────────────────────────────────── */
@layer theme, base, components, utilities;
@import "tailwindcss/theme.css" layer(theme);
@import "tailwindcss/utilities.css" layer(utilities);

@theme inline {
  /* Brand */
  --color-brand: var(--brand);
  --color-brand-light: var(--brand-light);
  --color-brand-deep: var(--brand-deep);
  --color-brand-tint: var(--brand-tint);
  /* Accents */
  --color-iris: var(--iris);  --color-iris-deep: var(--iris-deep);  --color-iris-tint: var(--iris-tint);
  --color-gold: var(--gold);  --color-gold-deep: var(--gold-deep);  --color-gold-tint: var(--gold-tint);
  --color-mint: var(--mint);  --color-mint-deep: var(--mint-deep);  --color-mint-tint: var(--mint-tint);
  --color-rose: var(--rose);  --color-rose-deep: var(--rose-deep);  --color-rose-tint: var(--rose-tint);
  --color-gap: var(--gap);
  /* Status */
  --color-live: var(--live);  --color-build: var(--build);  --color-plan: var(--plan);
  /* Text */
  --color-fg: var(--fg-1);  --color-fg-2: var(--fg-2);  --color-fg-3: var(--fg-3);  --color-fg-on-brand: var(--fg-on-brand);
  /* Surfaces */
  --color-paper: var(--bg);  --color-mist: var(--bg-2);  --color-lavender: var(--bg-muted);  --color-ink: var(--bg-ink);  --color-warm: var(--bg-warm);
  /* Borders */
  --color-line: var(--border);  --color-line-light: var(--border-light);  --color-line-hover: var(--border-hover);
  /* Fonts */
  --font-sans: var(--font-body);  --font-brand: var(--font-brand);  --font-display: var(--font-impact);  --font-serif: var(--font-serif);  --font-mono: var(--font-mono);
  /* Radius */
  --radius-xs: var(--radius-xs);  --radius-sm: var(--radius-sm);  --radius-md: var(--radius-md);  --radius-lg: var(--radius-lg);  --radius-xl: var(--radius-xl);
  /* Shadows */
  --shadow-sm: var(--shadow-sm);  --shadow-md: var(--shadow-md);  --shadow-lg: var(--shadow-lg);  --shadow-xl: var(--shadow-xl);  --shadow-brand: var(--shadow-brand);  --shadow-gold: var(--shadow-gold);
}

</style>
</head>

<body class="text-fg font-sans m-0 p-10" style="background: var(--bg-2);">
  <div class="max-w-[920px] mx-auto flex flex-col gap-8">
    <header class="flex flex-col gap-3">
      <span class="font-mono text-[13px] font-bold tracking-[0.32em] uppercase text-brand">Foundations · Radius</span>
      <h1 class="font-display font-extrabold text-[38px] leading-none tracking-tight">Border radius</h1>
      <p class="text-[17px] leading-relaxed text-fg-2 max-w-[640px]">Token bo góc map sang Tailwind: <code
          class="font-mono text-[13px] text-brand">rounded-sm/md/lg/xl</code> + <code
          class="font-mono text-[13px] text-brand">rounded-full</code> (pill).</p>
    </header>
    <section class="bg-paper border border-line rounded-xl shadow-sm p-8">
      <div class="flex flex-wrap gap-8">
        <div class="flex flex-col items-center gap-3">
          <div class="w-24 h-24 rounded-xs bg-brand"></div>
          <div class="text-center">
            <div class="font-mono text-[11px] text-fg font-semibold">rounded-xs</div>
            <div class="font-mono text-[10px] text-fg-3">--radius-xs · 4px</div>
          </div>
        </div>
        <div class="flex flex-col items-center gap-3">
          <div class="w-24 h-24 rounded-sm bg-brand"></div>
          <div class="text-center">
            <div class="font-mono text-[11px] text-fg font-semibold">rounded-sm</div>
            <div class="font-mono text-[10px] text-fg-3">--radius-sm · 8px</div>
          </div>
        </div>
        <div class="flex flex-col items-center gap-3">
          <div class="w-24 h-24 rounded-md bg-brand"></div>
          <div class="text-center">
            <div class="font-mono text-[11px] text-fg font-semibold">rounded-md</div>
            <div class="font-mono text-[10px] text-fg-3">--radius-md · 14px</div>
          </div>
        </div>
        <div class="flex flex-col items-center gap-3">
          <div class="w-24 h-24 rounded-lg bg-brand"></div>
          <div class="text-center">
            <div class="font-mono text-[11px] text-fg font-semibold">rounded-lg</div>
            <div class="font-mono text-[10px] text-fg-3">--radius-lg · 16px</div>
          </div>
        </div>
        <div class="flex flex-col items-center gap-3">
          <div class="w-24 h-24 rounded-xl bg-brand"></div>
          <div class="text-center">
            <div class="font-mono text-[11px] text-fg font-semibold">rounded-xl</div>
            <div class="font-mono text-[10px] text-fg-3">--radius-xl · 24px</div>
          </div>
        </div>
        <div class="flex flex-col items-center gap-3">
          <div class="w-24 h-24 rounded-full bg-brand"></div>
          <div class="text-center">
            <div class="font-mono text-[11px] text-fg font-semibold">rounded-full</div>
            <div class="font-mono text-[10px] text-fg-3">pill · 9999px</div>
          </div>
        </div>
      </div>
    </section>
  </div>
</body>

</html>
